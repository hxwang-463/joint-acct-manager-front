name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Never let two deploys race each other onto the server.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# Needed so the auto version bump can be pushed back to main.
permissions:
  contents: write

env:
  NODE_VERSION: '22'

jobs:
  verify:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the previous package.json can be read to decide
          # whether the version was already bumped by hand.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      # Runs before the build so the artifact carries the final version.
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ./scripts/auto-version.sh "${{ github.event.before }}"
          else
            # PRs and manual runs never bump; just report what is in the file.
            V=$(node -p "require('./package.json').version")
            echo "Not a push to main; using version ${V} without bumping."
            printf 'version=%s\nbumped=false\n' "$V" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit version bump
        if: steps.version.outputs.bumped == 'true'
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          # [skip ci] plus the fact that pushes made with GITHUB_TOKEN do not
          # trigger workflow runs: two independent guards against a loop.
          git commit -m "Bump version to v${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:main

      - run: npm run lint

      - run: npm run typecheck

      - name: Build static export
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
        run: npm run build

      - name: Upload static site
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: out/
          retention-days: 7
          if-no-files-found: error

  deploy:
    name: Deploy to Nginx
    needs: verify
    # Only real pushes to main deploy; PRs stop after the verify job.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download static site
        uses: actions/download-artifact@v4
        with:
          name: site
          path: out

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Upload release
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          set -euo pipefail
          # Version in the directory name so `ls releases/` reads as a
          # deployment history you can roll back through by version.
          RELEASE="${DEPLOY_ROOT}/releases/$(date -u +%Y%m%d%H%M%S)-v${VERSION}-${GITHUB_SHA::7}"
          echo "RELEASE=${RELEASE}" >> "$GITHUB_ENV"

          ssh -p "$SSH_PORT" "${SSH_USER}@${SSH_HOST}" "mkdir -p '${RELEASE}'"

          # Trailing slash on out/ copies the contents, not the directory itself.
          rsync -az --delete \
            -e "ssh -p ${SSH_PORT}" \
            out/ "${SSH_USER}@${SSH_HOST}:${RELEASE}/"

      - name: Activate release
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          DEPLOY_ROOT: ${{ secrets.DEPLOY_ROOT }}
        run: |
          set -euo pipefail
          # --noprofile --norc: the server's /etc/bashrc references an unset
          # variable, which would abort the script under `set -u` if it were
          # ever sourced. Skipping startup files keeps deploys independent of
          # the login environment.
          ssh -p "$SSH_PORT" "${SSH_USER}@${SSH_HOST}" \
            bash --noprofile --norc -euo pipefail -s <<EOF
            # Atomic swap: build the new symlink beside the old one, then rename
            # over it. Nginx never sees a half-written web root.
            ln -sfn '${RELEASE}' '${DEPLOY_ROOT}/current.tmp'
            mv -Tf '${DEPLOY_ROOT}/current.tmp' '${DEPLOY_ROOT}/current'

            # Keep the 5 most recent releases so a rollback is just another swap.
            cd '${DEPLOY_ROOT}/releases'
            ls -1dt */ | tail -n +6 | xargs -r rm -rf
          EOF

      # Asserts the *deployed* version, not just that something responds — a
      # 200 from a stale release would otherwise look like a successful deploy.
      - name: Verify deployed version
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "${SITE_URL}" ]; then
            echo "SITE_URL variable not set; skipping smoke check."
            exit 0
          fi

          # Matches the <meta name="app-version"> emitted by app/layout.tsx.
          # Attribute order is not guaranteed, so accept either arrangement.
          for attempt in 1 2 3 4 5; do
            body=$(curl -sS --max-time 15 -w '\n%{http_code}' "${SITE_URL}" 2>/dev/null || true)
            code=$(printf '%s' "$body" | tail -n1)

            served=$(printf '%s' "$body" \
              | grep -oE '<meta[^>]*app-version[^>]*>' \
              | grep -oE 'content="[^"]*"' \
              | head -1 | cut -d'"' -f2 || true)

            if [ "$code" = "200" ] && [ "$served" = "$VERSION" ]; then
              echo "Deploy confirmed: ${SITE_URL} is serving v${VERSION}."
              exit 0
            fi

            echo "Attempt ${attempt}: status=${code}, served version='${served:-none}', want '${VERSION}'; retrying in 5s..."
            sleep 5
          done

          echo "::error::Site did not serve v${VERSION} after deploy (last status ${code})."
          echo "Roll back with:"
          echo "  D=${DEPLOY_ROOT:-/usr/share/nginx/joint-deploy}"
          echo '  ls -1dt $D/releases/*/    # pick the previous one'
          echo '  ln -sfn $D/releases/<prev> $D/current.tmp && mv -Tf $D/current.tmp $D/current'
          exit 1
